[project]
name = "nuextract-2-0-pipeline"
version = "0.5.0"
description = "Structured extraction pipeline using NuExtract-2.0-4B with Streamlit UI"
requires-python = ">=3.12"
dependencies = [
    "accelerate==1.12.0",
    "pandas==2.3.3",
    "pyyaml==6.0.2",
    "python-dotenv==1.1.0",
    "qwen-vl-utils==0.0.14",
    "streamlit==1.54.0",
    "torch==2.10.0",
    "torchvision==0.25.0",
    "transformers==5.1.0",
]

[dependency-groups]
dev = [
    "pytest==9.0.2",
    "ruff==0.15.0",
    "ty==0.0.16",
]

[tool.ruff.lint.per-file-ignores]
"streamlit_app.py" = ["E402"]
