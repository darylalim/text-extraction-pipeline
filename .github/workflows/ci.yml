name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # macos-14 provides Apple Silicon runners; MLX requires arm64 macOS.
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run ty check
        continue-on-error: true  # ty is pre-1.0 and has a known pre-existing diagnostic

      - name: Run tests
        run: uv run pytest -v
        # Excludes e2e tests by default (pyproject.toml addopts); those require
        # the 4 GB model and are run manually with `uv run pytest -m e2e`.
